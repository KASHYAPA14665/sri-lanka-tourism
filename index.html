    <style>
        /* 🔥 FORCE FIX NAVBAR */
.navbar-custom {
    position: fixed !important;   /* force override */
    top: 0;
    left: 0;
    width: 100%;
    z-index: 9999;

    background: transparent !important;  /* remove blue bar */
}

/* container for alignment */
.nav-container {
    max-width: 1200px;
    margin: auto;
    padding: 20px 40px;

    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* LOGO */
.logo {
    color: #fff;
    font-size: 22px;
    font-weight: 700;
}

/* MENU */
.menu a {
    color: #fff !important;
    text-decoration: none;
    margin-left: 50px;
    font-weight: 500;
    transition: 0.3s;
}

/* ACTIVE + HOVER */
.menu a:hover,
.menu a.active {
    color: #ff6a00 !important;
}

/* 🔥 REMOVE ANY BACKGROUND FROM HEADER NAV */
header nav {
    background: transparent !important;
}

/* 🔥 SCROLL EFFECT */
.navbar-scrolled {
    background: rgba(0,0,0,0.6) !important;
    backdrop-filter: blur(10px);
}

/* MOBILE FIX */
@media(max-width:768px){
    .nav-container {
        padding: 15px 20px;
    }

    .menu a {
        margin-left: 15px;
        font-size: 14px;
    }
}
    </style>
</head>
<body>

    <header>
       <nav class="navbar-custom">
    <div class="nav-container">
        <div class="logo">SRI LANKA</div>

        </div>
    </div>
</nav>

window.addEventListener("scroll", function(){
    document.querySelector(".navbar-custom")
    .classList.toggle("navbar-scrolled", window.scrollY > 50);
