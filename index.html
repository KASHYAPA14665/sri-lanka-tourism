<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Application</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Ads -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9025002091352978" crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-9025002091352978">
</head>

<body>

<header class="container-fluid d-flex justify-content-between align-items-center p-3">
    <nav class="navbar">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <div id="clock">
        <h4 id="date-time"></h4>
    </div>
</header>

<main>
<section class="carousel">

    <!-- MAIN SLIDES -->
    <div class="list">

        <!-- VIDEO SLIDE -->
        <div class="item">
            <video autoplay muted loop class="video">
                <source src="video/174999-852541228_medium.mp4" type="video/mp4">
            </video>

            <div class="content">
                <div class="author">SRI LANKA</div>
                <h2 class="title">WELCOME TO SRI LANKA</h2>
                <h3 class="topic">Travel Your Paradise</h3>
                <p class="description">
                    Discover the beauty of Sri Lanka with stunning الطبيعة, الثقافة, and unforgettable experiences.
                </p>
            </div>
        </div>

        <!-- IMAGE SLIDES -->
        <!-- Repeat pattern -->
        <div class="item">
            <img src="images/image-1.jpg" alt="Sri Lanka scenic view" loading="lazy">
            <div class="content">
                <div class="author">LUNDEV</div>
                <h2 class="title">DESIGN SLIDER</h2>
                <h3 class="topic">PICTURE</h3>
                <p class="description">Sample description for slider content.</p>

                <div class="button">
                    <button aria-label="See more">SEE MORE</button>
                    <button aria-label="Subscribe">SUBSCRIBE</button>
                </div>
            </div>
        </div>

        <!-- Add more items similarly -->

    </div>

    <!-- THUMBNAILS -->
    <div class="thumbnail">

        <div class="item">
            <img src="images/image-1.jpg" alt="Thumbnail 1" loading="lazy">
            <div class="content">
                <div class="title">Slider 1</div>
                <div class="description">Preview</div>
            </div>
        </div>

        <div class="item">
            <video controls class="video-thumb">
                <source src="video/174999-852541228_medium.mp4" type="video/mp4">
            </video>
            <div class="content">
                <div class="title">Video</div>
                <div class="description">Preview</div>
            </div>
        </div>

    </div>

    <!-- NAVIGATION -->
    <div class="arrows">
        <button id="prev" aria-label="Previous slide">&lt;</button>
        <button id="next" aria-label="Next slide">&gt;</button>
    </div>

    <div class="time"></div>

</section>
</main>

<script src="index.js" defer></script>

</body>
</html>
