<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRI LANKA TRAVEL</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
/* 🔥 RESET NAVBAR ISSUES */
nav, .navbar, .navbar-custom {
    background: transparent !important;
}

/* 🔥 MAIN NAVBAR */
.navbar-custom {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 9999;
}

/* CONTAINER */
.nav-container {
    max-width: 1200px;
    margin: auto;
    padding: 20px 40px;

    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* LOGO */
.logo {
    color: #fff;
    font-size: 22px;
    font-weight: 700;
}

/* MENU */
.menu a {
    color: #fff;
    text-decoration: none;
    margin-left: 30px;
    font-weight: 500;
    transition: 0.3s;
}

/* HOVER */
.menu a:hover,
.menu a.active {
    color: #ff6a00;
}

/* 🔥 SCROLL EFFECT */
.navbar-scrolled {
    background: rgba(0,0,0,0.6) !important;
    backdrop-filter: blur(10px);
}

/* HERO FIX */
header {
    position: relative;
}

/* VIDEO FULL SCREEN */
.video-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    object-fit: cover;
    z-index: -1;
}

/* CONTENT ON TOP */
.content {
    position: relative;
    z-index: 2;
    color: white;
    padding: 150px 60px;
}

/* MOBILE */
@media(max-width:768px){
    .nav-container {
        padding: 15px 20px;
    }

    .menu a {
        margin-left: 15px;
        font-size: 14px;
    }

    .content {
        padding: 120px 20px;
    }
}
    </style>
</head>

<body>

<header>

<!-- ✅ PERFECT NAVBAR -->
<nav class="navbar-custom">
    <div class="nav-container">
        <div class="logo">SRI LANKA</div>

        <div class="menu">
            <a href="index.html" class="active">Home</a>
            <a href="about.html">About</a>
            <a href="explore.html">Explore Places</a>
            <a href="#">Contact</a>
        </div>
    </div>
</nav>

<!-- VIDEO BACKGROUND -->
<video class="video-bg" autoplay loop muted playsinline>
    <source src="vedio/174999-852541228_medium.mp4" type="video/mp4">
</video>

<!-- CONTENT -->
<div class="content">
    <div>OFFICIAL TRAVEL GUIDE</div>
    <h1>SRI LANKA</h1>
    <h2 style="color:#ff6a00;">WONDER OF ASIA</h2>
    <p>
        Experience the breathtaking landscapes, ancient heritage, and the warm hospitality
        of the pearl of the Indian Ocean.
    </p>

    <button style="padding:10px 20px;border-radius:20px;border:none;">EXPLORE NOW</button>
    <button style="padding:10px 20px;border-radius:20px;border:1px solid #fff;background:transparent;color:white;">SUBSCRIBE</button>
</div>

</header>

<!-- 🔥 SCROLL EFFECT -->
<script>
window.addEventListener("scroll", function(){
    document.querySelector(".navbar-custom")
    .classList.toggle("navbar-scrolled", window.scrollY > 50);
});
</script>

</body>
</html>
