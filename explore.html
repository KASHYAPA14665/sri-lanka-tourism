<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore Sri Lanka</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #2d5a27;
    --accent: #f39c12;
    --light: #f4f4f4;
    --dark: #1a1a1a;
    --glass: rgba(255,255,255,0.1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: var(--light);
}

/* ✅ NAVBAR FIX */
.navbar-custom {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    z-index: 1000;
}

.menu a {
    color: white;
    text-decoration: none;
    margin-left: 25px;
    font-weight: 500;
    transition: 0.3s;
}

.menu a:hover,
.menu .active {
    color: var(--accent);
}

/* HERO */
header {
    height: 80vh;
    background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url('https://images.unsplash.com/photo-1546708973-b339540b5162?auto=format&fit=crop&w=2000&q=80');
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color:white;
    text-align:center;
    padding-top:80px;
}

header h1 {
    font-size: 3.5rem;
}

/* GRID */
.container {
    max-width: 1200px;
    margin: -50px auto 50px;
    padding: 20px;
}

.explore-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
    gap: 25px;
}

.card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

/* ✅ IMAGE FIX */
.card-img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

/* fallback if image fails */
.card-img.error {
    content: url('https://via.placeholder.com/800x400?text=Image+Not+Available');
}

.card-content {
    padding: 20px;
}

.category-tag {
    background: var(--primary);
    color: white;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
}

.btn {
    display:inline-block;
    margin-top:10px;
    padding:8px 15px;
    background:var(--dark);
    color:white;
    border-radius:8px;
    text-decoration:none;
}

footer {
    background: var(--dark);
    color:white;
    text-align:center;
    padding:30px;
}

/* MOBILE */
@media(max-width:768px){
    .menu a {
        margin-left: 15px;
        font-size: 14px;
    }

    header h1 {
        font-size: 2.2rem;
    }
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar-custom">
    <div style="color:white;font-weight:700;">Sri Lanka</div>
    <div class="menu">
        <a href="#" class="active">Home</a>
        <a href="#">About</a>
        <a href="#">Explore</a>
        <a href="#">Contact</a>
    </div>
</nav>

<header>
    <h1>Explore Sri Lanka</h1>
    <p>Discover paradise on earth</p>
</header>

<div class="container">

<div class="explore-grid">

<!-- CARD -->
<div class="card">
<img class="card-img" loading="lazy"
src="https://images.unsplash.com/photo-1588598116712-32a524a87c10?auto=format&fit=crop&w=800&q=80"
onerror="this.src='https://via.placeholder.com/800x400?text=Image+Error'">
<div class="card-content">
<span class="category-tag">Heritage</span>
<h3>Sigiriya</h3>
<p>Ancient rock fortress.</p>
</div>
</div>

<div class="card">
<img class="card-img" loading="lazy"
src="https://images.unsplash.com/photo-1552423158-958265b7725b?auto=format&fit=crop&w=800&q=80"
onerror="this.src='https://via.placeholder.com/800x400?text=Image+Error'">
<div class="card-content">
<span class="category-tag">Nature</span>
<h3>Ella</h3>
<p>Mountain paradise views.</p>
</div>
</div>

</div>

</div>

<footer>
<p>© 2026 Explore Sri Lanka</p>
</footer>

</body>
</html>
